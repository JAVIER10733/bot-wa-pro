<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro | BotWA Pro</title>
    <meta name="description" content="Crea tu cuenta en BotWA Pro y comienza a automatizar tu WhatsApp hoy mismo.">
    <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>

<body>
    <div class="container">
        <header role="banner">
            <a href="../index.html" class="brand">
                <i class="fab fa-whatsapp"></i>
                <span>BotWA Pro</span>
            </a>
            <nav class="nav">
                <a href="../index.html">Inicio</a>
                <a href="login.html" class="cta">Iniciar Sesión</a>
            </nav>
        </header>

        <main id="main-content">
            <section class="auth-section">
                <div class="auth-wrapper">
                    <article class="card auth-card">
                        <header class="auth-header">
                            <h1 class="auth-title">Crea tu cuenta</h1>
                            <p class="auth-subtitle">Únete a la mejor plataforma de automatización para WhatsApp</p>
                        </header>

                        <form id="register-form" class="auth-form" novalidate>
                            <div class="form-field">
                                <label for="name" class="form-label">Nombre completo</label>
                                <input class="input" id="name" name="name" type="text" required placeholder="Tu nombre">
                                <span id="name-error" class="form-error"></span>
                            </div>

                            <div class="form-field">
                                <label for="email" class="form-label">Correo electrónico</label>
                                <input class="input" id="email" name="email" type="email" required
                                    placeholder="tu@email.com">
                                <span id="email-error" class="form-error"></span>
                            </div>

                            <div class="form-field">
                                <label for="password" class="form-label">Contraseña</label>
                                <input class="input" id="password" name="password" type="password" required
                                    placeholder="••••••••" minlength="8">
                                <span id="password-error" class="form-error"></span>
                            </div>

                            <button type="submit" class="auth-submit" id="submit-btn">
                                <span class="btn-text">Registrarse</span>
                            </button>

                            <div id="form-error" class="form-error global"></div>
                        </form>

                        <div class="auth-divider">
                            <span>o regístrate con</span>
                        </div>

                        <div class="social-login">
                            <button type="button" class="social-btn google" id="btn-google">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="#4285F4"
                                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                    <path fill="#34A853"
                                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                    <path fill="#FBBC05"
                                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                    <path fill="#EA4335"
                                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                                </svg>
                                <span>Google</span>
                            </button>
                            <button type="button" class="social-btn github" id="btn-github">
                                <i class="fab fa-github" style="font-size: 20px;"></i>
                                <span>GitHub</span>
                            </button>
                        </div>

                        <footer class="auth-footer">
                            <p>¿Ya tienes cuenta? <a href="login.html" class="link-primary">Inicia sesión</a></p>
                        </footer>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        (function () {
            'use strict';
            const $ = (sel) => document.querySelector(sel);

            // Oauth
            $('#btn-google')?.addEventListener('click', () => {
                window.location.href = '/BotWA-Pro/api/v1/google_auth.php?action=redirect';
            });
            $('#btn-github')?.addEventListener('click', () => {
                window.location.href = '/BotWA-Pro/api/v1/github_auth.php?action=redirect';
            });

            // Registro normal
            $('#register-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = $('#name').value;
                const email = $('#email').value;
                const password = $('#password').value;

                try {
                    const res = await API.auth.register(name, email, password);
                    if (res.ok) {
                        window.location.href = '/BotWA-Pro/cliente/dashboard.html';
                    } else {
                        $('#form-error').textContent = res.data.message;
                    }
                } catch (err) {
                    $('#form-error').textContent = 'Error de conexión';
                }
            });
        })();
    </script>
</body>

</html>
